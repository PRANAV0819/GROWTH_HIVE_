{% extends 'base.html' %}
{% load static %}
{% block content %}
<!-- 
  Note: This assumes your base.html includes the Tailwind CSS CDN 
  and the Inter font exactly like the landing page.
-->
{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}
<div class="min-h-[85vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 font-sans antialiased">
    <div class="max-w-md w-full bg-white p-8 sm:p-10 rounded-2xl shadow-xl border border-slate-100 space-y-8 relative overflow-hidden">
        
        <!-- Decorative abstract blob matching the landing page -->
        <div class="absolute -top-12 -right-12 w-40 h-40 bg-brand-100 rounded-full blur-3xl opacity-60 z-0 pointer-events-none"></div>
        
        <div class="relative z-10">
            <!-- Header section -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-brand-500 text-white font-bold mb-5 shadow-sm">
                    <!-- Hexagon SVG Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
                </div>
                <h2 class="text-3xl font-bold tracking-tight text-slate-900 mb-2">Welcome back</h2>
                <p class="text-sm text-slate-500">
                    Log in to your GrowthHive account
                </p>
            </div>

            <!-- Login Form -->
            <form class="space-y-6" method="POST">
                {% csrf_token %}
                
                <div class="space-y-5">
                    <!-- Username Input -->
                    <div>
                        <label  for="username" class="block text-sm font-medium text-slate-700 mb-1.5">Username</label>
                        <input id="username" name="username" type="text" required 
                            class="appearance-none relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 sm:text-sm transition-colors shadow-sm bg-slate-50 focus:bg-white" 
                            placeholder="Enter your username">
                    </div>
                    
                    <!-- Password Input -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                        <input id="password" name="password" type="password" required 
                            class="appearance-none relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 sm:text-sm transition-colors shadow-sm bg-slate-50 focus:bg-white" 
                            placeholder="Enter your password">
                    </div>
                </div>

                <!-- Extras: Remember Me & Forgot Password -->
                <div class="flex items-center justify-between mt-4">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" 
                            class="h-4 w-4 text-brand-600 focus:ring-brand-500 border-slate-300 rounded cursor-pointer accent-brand-500">
                        <label for="remember-me" class="ml-2 block text-sm text-slate-600 cursor-pointer">
                            Remember me
                        </label>
                    </div>

                    <div class="text-sm">
                        <!-- Update href with your actual forgot password route if you have one -->
                        <a href="#" class="font-medium text-brand-600 hover:text-brand-500 transition-colors">
                            Forgot password?
                        </a>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="pt-2">
                    <button type="submit" 
                        
                        class="w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-medium rounded-xl text-white bg-slate-900 hover:bg-brand-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-all duration-300 shadow-md hover:shadow-lg hover:-translate-y-0.5">
                        Sign in to account
                    </button>
                </div>
            </form>

            <!-- Register Link -->
            <div class="mt-8 text-center text-sm text-slate-600 border-t border-slate-100 pt-6">
                Don't have an account? 
                <a href="/accounts/register/" class="font-semibold text-brand-600 hover:text-brand-500 transition-colors ml-1">
                    Join the Hive
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
