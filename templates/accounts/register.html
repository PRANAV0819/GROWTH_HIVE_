{% extends 'base.html' %}
{% load static %}

{% block content %}
<!-- 
  Premium SaaS Registration Form
  Centered, responsive, and features micro-interactions.
-->
<div class="min-h-[85vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 font-sans antialiased relative z-0">
    
    <!-- Abstract Ambient Background -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0 flex items-center justify-center">
        <div class="w-[30rem] h-[30rem] bg-brand-100 rounded-full blur-3xl opacity-40 absolute -ml-[20rem] -mt-[10rem]"></div>
        <div class="w-[30rem] h-[30rem] bg-blue-50 rounded-full blur-3xl opacity-50 absolute ml-[20rem] mt-[10rem]"></div>
    </div>

    <!-- Main Registration Card -->
    <!-- hover:-translate-y-2 and hover:shadow-2xl creates the rising effect -->
    <div class="max-w-md w-full bg-white/90 backdrop-blur-sm p-8 sm:p-10 rounded-3xl shadow-xl border border-slate-100/80 hover:-translate-y-2 hover:shadow-2xl transition-all duration-500 relative z-10">
        
        <!-- Header Section -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-dark-900 text-white font-bold mb-6 shadow-md transform -rotate-3 hover:rotate-0 transition-transform duration-300">
                <i data-lucide="hexagon" class="w-7 h-7"></i>
            </div>
            <h2 class="text-3xl font-extrabold tracking-tight text-slate-900 mb-2">Create Account</h2>
            <p class="text-sm font-medium text-slate-500">
                Join the ultimate campus ecosystem today.
            </p>
        </div>

        <!-- Dynamic Error Banner (Triggered by backend validation) -->
        {% if error %}
        <div class="bg-rose-50/80 backdrop-blur-sm border border-rose-200 text-rose-700 text-sm p-4 rounded-xl flex items-start gap-3 mb-6 shadow-sm animate-pulse-once">
            <i data-lucide="alert-circle" class="w-5 h-5 text-rose-500 flex-shrink-0 mt-0.5"></i>
            <div>
                <p class="font-semibold mb-0.5">Registration Failed</p>
                <p class="text-rose-600 opacity-90">{{ error }}</p>
            </div>
        </div>
        {% endif %}

        <!-- Registration Form -->
        <form class="space-y-5" method="POST">
            {% csrf_token %}
            
            <!-- Username Input -->
            <div>
                <label for="username" class="block text-sm font-semibold text-slate-700 mb-1.5">Username <span class="text-rose-500">*</span></label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-brand-500 transition-colors">
                        <i data-lucide="at-sign" class="w-4 h-4"></i>
                    </div>
                    <input id="username" name="username" type="text" required 
                        class="appearance-none block w-full pl-11 pr-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 sm:text-sm transition-all shadow-sm bg-slate-50/50 focus:bg-white" 
                        placeholder="Choose a unique username">
                </div>
            </div>

            <!-- Email Input -->
            <div>
                <label for="email" class="block text-sm font-semibold text-slate-700 mb-1.5">Email Address <span class="text-rose-500">*</span></label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-brand-500 transition-colors">
                        <i data-lucide="mail" class="w-4 h-4"></i>
                    </div>
                    <input id="email" name="email" type="email" required 
                        class="appearance-none block w-full pl-11 pr-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 sm:text-sm transition-all shadow-sm bg-slate-50/50 focus:bg-white" 
                        placeholder="you@example.com">
                </div>
            </div>

            <!-- Role Selection -->
            <div>
                <label for="role" class="block text-sm font-semibold text-slate-700 mb-1.5">Account Type <span class="text-rose-500">*</span></label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-brand-500 transition-colors">
                        <i data-lucide="user-circle" class="w-4 h-4"></i>
                    </div>
                    <select id="role" name="role" required
                        class="appearance-none block w-full pl-11 pr-10 py-3 border border-slate-200 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 sm:text-sm transition-all shadow-sm bg-slate-50/50 focus:bg-white cursor-pointer font-medium">
                        <option value="" disabled selected>Select your role...</option>
                        <option value="student">Student</option>
                        <option value="alumni">Alumni</option>
                        <option value="admin">Admin</option>
                    </select>
                    <!-- Custom Dropdown Arrow -->
                    <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400">
                        <i data-lucide="chevron-down" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>
            
            <!-- Password Input -->
            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-1.5">Password <span class="text-rose-500">*</span></label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-brand-500 transition-colors">
                        <i data-lucide="lock" class="w-4 h-4"></i>
                    </div>
                    <input id="password" name="password" type="password" required 
                        class="appearance-none block w-full pl-11 pr-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 sm:text-sm transition-all shadow-sm bg-slate-50/50 focus:bg-white" 
                        placeholder="Create a strong password">
                </div>
            </div>

            <!-- Submit Button -->
            <div class="pt-4">
                <button type="submit" 
                    class="w-full flex justify-center items-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-dark-900 hover:bg-brand-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-all duration-300 shadow-md hover:shadow-lg hover:-translate-y-0.5">
                    Sign Up Now
                    <i data-lucide="arrow-right" class="w-4 h-4 ml-2"></i>
                </button>
            </div>
        </form>

        <!-- Footer / Login Link -->
        <div class="mt-8 text-center text-sm font-medium text-slate-500 pt-6 border-t border-slate-100">
            Already have an account? 
            <a href="/accounts/login/" class="font-bold text-dark-900 hover:text-brand-600 transition-colors ml-1 inline-flex items-center group">
                Log in here
                <i data-lucide="arrow-right" class="w-3 h-3 ml-1 opacity-0 group-hover:opacity-100 transition-all -translate-x-2 group-hover:translate-x-0"></i>
            </a>
        </div>
    </div>
</div>

<style>
    /* Add a subtle intro animation for the error box */
    @keyframes pulse-once {
        0% { transform: scale(0.95); opacity: 0; }
        50% { transform: scale(1.02); }
        100% { transform: scale(1); opacity: 1; }
    }
    .animate-pulse-once {
        animation: pulse-once 0.4s ease-out forwards;
    }
</style>

<!-- Re-initialize icons -->
<script>
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();
    }
</script>
{% endblock %}
