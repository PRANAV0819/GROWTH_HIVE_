{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="max-w-3xl mx-auto w-full font-sans antialiased">
    
    <!-- Page Header -->
    <div class="mb-8">
        <a href="/marketplace/" class="inline-flex items-center text-sm font-medium text-slate-500 hover:text-brand-600 transition-colors mb-4">
            <i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i>
            Back to Marketplace
        </a>
        <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">List an Item for Sale</h1>
        <p class="text-slate-500 mt-2">Upload a clear picture and add details to help your item sell faster.</p>
    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden relative">
        <!-- Abstract background blob -->
        <div class="absolute -top-24 -right-24 w-64 h-64 bg-brand-50 rounded-full blur-3xl opacity-60 z-0 pointer-events-none"></div>

        <!-- IMPORTANT: enctype="multipart/form-data" is required for image uploads -->
        <form method="POST" enctype="multipart/form-data" class="relative z-10 p-6 sm:p-10 space-y-8">
            {% csrf_token %}

            <!-- Image Upload Section with Live Preview -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Item Image <span class="text-rose-500">*</span></label>
                
                <div class="relative group">
                    <!-- The actual file input (hidden but covers the area) -->
                    <input type="file" id="item_image" name="image" accept="image/*" required onchange="previewItemImage(event)"
                           class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20">
                    
                    <!-- The Upload UI / Dropzone -->
                    <div id="dropzone-ui" class="w-full aspect-video sm:aspect-[21/9] rounded-2xl border-2 border-dashed border-slate-300 bg-slate-50 group-hover:bg-brand-50 group-hover:border-brand-300 transition-colors flex flex-col items-center justify-center relative overflow-hidden">
                        
                        <!-- Default State (Prompt) -->
                        <div id="upload-prompt" class="flex flex-col items-center justify-center text-slate-500 group-hover:text-brand-600 transition-colors pointer-events-none p-6 text-center">
                            <div class="w-14 h-14 bg-white rounded-full shadow-sm flex items-center justify-center mb-3">
                                <i data-lucide="image-plus" class="w-6 h-6"></i>
                            </div>
                            <p class="text-sm font-semibold mb-1">Click to upload an image</p>
                            <p class="text-xs text-slate-400">PNG, JPG, GIF up to 5MB</p>
                        </div>

                        <!-- Preview State (Hidden by default) -->
                        <div id="image-preview-container" class="absolute inset-0 w-full h-full hidden pointer-events-none">
                            <img id="preview-image" src="" alt="Item Preview" class="w-full h-full object-cover">
                            <!-- Overlay to indicate it can be changed -->
                            <div class="absolute inset-0 bg-dark-900/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                <span class="px-4 py-2 bg-white/90 backdrop-blur-sm rounded-xl text-sm font-bold text-slate-900 flex items-center shadow-lg">
                                    <i data-lucide="refresh-cw" class="w-4 h-4 mr-2"></i> Change Image
                                </span>
                            </div>
                        </div>
                        
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <!-- Item Name -->
                <div>
                    <label for="title" class="block text-sm font-bold text-slate-700 mb-1.5">Item Name <span class="text-rose-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                            <i data-lucide="tag" class="w-5 h-5"></i>
                        </div>
                        <input type="text" id="title" name="title" required placeholder="e.g. Engineering Mathematics Textbook"
                            class="appearance-none block w-full pl-12 pr-4 py-3.5 border border-slate-200 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 sm:text-sm transition-colors shadow-sm bg-slate-50 focus:bg-white">
                    </div>
                </div>

                <!-- Price -->
                <div>
                    <label for="price" class="block text-sm font-bold text-slate-700 mb-1.5">Selling Price (₹) <span class="text-rose-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                            <i data-lucide="indian-rupee" class="w-5 h-5"></i>
                        </div>
                        <input type="number" id="price" name="price" min="0" required placeholder="0"
                            class="appearance-none block w-full pl-12 pr-4 py-3.5 border border-slate-200 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 sm:text-sm transition-colors shadow-sm bg-slate-50 focus:bg-white">
                    </div>
                </div>

                <!-- Description -->
                <div>
                    <label for="description" class="block text-sm font-bold text-slate-700 mb-1.5">Description <span class="text-rose-500">*</span></label>
                    <textarea id="description" name="description" required rows="4" placeholder="Describe the condition of the item, any damages, and why you are selling it..."
                        class="appearance-none block w-full px-4 py-3.5 border border-slate-200 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 sm:text-sm transition-colors shadow-sm bg-slate-50 focus:bg-white resize-y"></textarea>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="pt-6 border-t border-slate-100 flex flex-col sm:flex-row justify-end gap-3 mt-8">
                <a href="/marketplace/" class="inline-flex justify-center items-center px-6 py-3 border border-slate-200 shadow-sm text-sm font-bold rounded-xl text-slate-700 bg-white hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors">
                    Cancel
                </a>
                <button type="submit" class="inline-flex justify-center items-center px-8 py-3 border border-transparent text-sm font-bold rounded-xl text-white bg-dark-900 hover:bg-brand-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-all duration-300 shadow-lg hover:shadow-xl hover:-translate-y-0.5">
                    <i data-lucide="check-circle" class="w-4 h-4 mr-2"></i>
                    Post Item
                </button>
            </div>
        </form>
    </div>
</div>

<!-- JavaScript to handle live image preview before upload -->
<script>
    function previewItemImage(event) {
        const fileInput = event.target;
        const file = fileInput.files[0];
        
        const previewContainer = document.getElementById('image-preview-container');
        const previewImage = document.getElementById('preview-image');
        const uploadPrompt = document.getElementById('upload-prompt');
        const dropzoneUi = document.getElementById('dropzone-ui');
        
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                // Set the image source
                previewImage.src = e.target.result;
                
                // Show the preview, hide the prompt
                previewContainer.classList.remove('hidden');
                uploadPrompt.classList.add('hidden');
                
                // Optional: remove dashed border when image is present for a cleaner look
                dropzoneUi.classList.remove('border-dashed');
                dropzoneUi.classList.add('border-solid');
            }
            reader.readAsDataURL(file);
        }
    }

    // Re-initialize icons
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();
    }
</script>
{% endblock %}
